# Read JWT from cookie set by auth-server
# Note: use $cookie_jwt directly for token extraction

server {
    listen 80;
    server_name localhost;

    # Public authentication endpoints
    location /auth/ {
        auth_request off;
        proxy_pass http://auth-server:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check - no auth required
    location /auth/health {
        auth_request off;
        proxy_pass http://auth-server:3001/health;
        access_log off;
    }

    # Internal auth request to validate JWT from cookie
    location = /_auth_request {
        internal;
        proxy_pass http://auth-server:3001/verify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $cookie_jwt";
    }

    # Protected ComfyUI endpoints - require valid JWT cookie
    location / {
        # Validate JWT via subrequest; 200 allows, 401/403 denies
        auth_request /_auth_request;

        proxy_pass http://comfyui:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward JWT to backend for any additional checks
        proxy_set_header Authorization "Bearer $cookie_jwt";
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
