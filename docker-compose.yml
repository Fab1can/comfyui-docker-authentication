services:

  comfyui:
    image: zeroclue/comfyui:ultra-slim-torch2.8.0-cu128
    volumes:
      - ./workspace:/workspace
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  auth-server:
    build:
      context: ./auth-server
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-key}
      - JWT_EXPIRATION=7d
      - PORT=3001
    depends_on:
      - comfyui

  nginx:
    image: nginx:alpine
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - comfyui
      - auth-server
